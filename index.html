<!DOCTYPE html>
<html lang="en">
<head>
<!-- DEMO ONLY — all data is fake -->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Befreed CRM — Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sidebar-bg: #0f0f0f;
    --main-bg: #111827;
    --card-bg: #1f2937;
    --card-hover: #263547;
    --accent: #3b82f6;
    --accent-dim: #1d4ed8;
    --alert-red: #ef4444;
    --warning-amber: #f59e0b;
    --success-green: #10b981;
    --text-primary: #f9fafb;
    --text-secondary: #9ca3af;
    --text-muted: #6b7280;
    --border: #374151;
    --border-light: #4b5563;
    --tier-green: #10b981;
    --tier-yellow: #f59e0b;
    --tier-red: #ef4444;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--main-bg);
    color: var(--text-primary);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    border-right: 1px solid #1a1a1a;
    z-index: 10;
  }

  .sidebar-brand {
    padding: 24px 20px 20px;
    border-bottom: 1px solid #1a1a1a;
  }

  .sidebar-brand .logo-text {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }

  .sidebar-brand .logo-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .sidebar-nav {
    padding: 16px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 13.5px;
    font-weight: 500;
    transition: all 0.15s ease;
    user-select: none;
  }

  .nav-item:hover { background: #1a1a1a; color: var(--text-primary); }
  .nav-item.active { background: rgba(59, 130, 246, 0.12); color: var(--accent); }
  .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }

  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid #1a1a1a;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── MAIN ── */
  .main {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .screen {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    padding: 28px 32px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease;
  }

  .screen.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ── TOGGLE BUTTONS ── */
  .toggle-group {
    display: inline-flex;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .toggle-btn {
    padding: 7px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    border: none;
    background: transparent;
    transition: all 0.15s ease;
    letter-spacing: 0.2px;
  }

  .toggle-btn:not(:last-child) {
    border-right: 1px solid var(--border);
  }

  .toggle-btn.active {
    background: var(--accent);
    color: white;
  }

  /* ── DASHBOARD ── */
  .dash-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .dash-controls-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .controls-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .dash-panels {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }

  .panel-left {
    flex: 0 0 60%;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-right {
    flex: 0 0 calc(40% - 20px);
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── TIER SECTION ── */
  .tier-section {
    border-radius: 12px;
    padding: 16px 18px;
  }

  .tier-section.green {
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.3);
  }

  .tier-section.yellow {
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.3);
  }

  .tier-section.red {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.3);
  }

  .tier-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .tier-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .tier-dot.green { background: var(--tier-green); box-shadow: 0 0 6px rgba(16,185,129,0.5); }
  .tier-dot.yellow { background: var(--tier-yellow); box-shadow: 0 0 6px rgba(245,158,11,0.5); }
  .tier-dot.red { background: var(--tier-red); box-shadow: 0 0 6px rgba(239,68,68,0.5); }

  .tier-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-secondary);
  }

  .tier-sublabel {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 2px;
  }

  .tier-count {
    margin-left: auto;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    color: var(--text-secondary);
  }

  .tier-avatars {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
  }

  .creator-avatar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: transform 0.15s ease;
  }

  .creator-avatar-wrap:hover { transform: translateY(-2px); }

  .avatar-circle {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    color: white;
    border: 2px solid rgba(255,255,255,0.1);
    transition: border-color 0.15s ease;
    position: relative;
  }

  .creator-avatar-wrap:hover .avatar-circle {
    border-color: rgba(255,255,255,0.3);
  }

  .avatar-name {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    text-align: center;
    max-width: 60px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .avatar-stat {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-align: center;
  }

  .avatar-stat-views {
    font-size: 10px;
    font-weight: 700;
    text-align: center;
  }

  /* ── BABIES SECTION ── */
  .babies-section {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
  }

  .babies-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .babies-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-secondary);
  }

  .babies-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .baby-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .baby-card:hover {
    background: rgba(59,130,246,0.08);
    border-color: rgba(59,130,246,0.3);
  }

  .baby-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .baby-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 3px;
  }

  .baby-action {
    font-size: 11px;
    font-weight: 600;
    color: var(--warning-amber);
  }

  /* ── VIDEO RANKINGS ── */
  .rankings-panel {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .rankings-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-secondary);
  }

  .rankings-cols {
    display: flex;
  }

  .ranking-col {
    flex: 1;
    min-width: 0;
  }

  .ranking-col:first-child {
    border-right: 1px solid var(--border);
  }

  .ranking-col-header {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .col-worst .ranking-col-header { color: var(--alert-red); background: rgba(239,68,68,0.05); }
  .col-best .ranking-col-header { color: var(--success-green); background: rgba(16,185,129,0.05); }

  .video-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    border-bottom: 1px solid rgba(55,65,81,0.4);
    cursor: pointer;
    transition: background 0.12s ease;
  }

  .video-row:last-child { border-bottom: none; }
  .video-row:hover { background: rgba(255,255,255,0.03); }

  .video-rank {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    width: 16px;
    text-align: right;
    flex-shrink: 0;
  }

  .platform-icon {
    font-size: 13px;
    flex-shrink: 0;
    width: 18px;
    text-align: center;
  }

  .video-info {
    flex: 1;
    min-width: 0;
  }

  .video-creator {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-bottom: 2px;
  }

  .video-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .video-views {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-secondary);
    flex-shrink: 0;
  }

  /* ── INDIVIDUAL VIEW ── */
  #screen-creator {
    padding: 0;
  }

  .creator-view-inner {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  /* Top bar */
  .cv-topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 24px;
    border-bottom: 1px solid #1a1a1a;
    background: var(--sidebar-bg);
    flex-shrink: 0;
  }

  .cv-topbar-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
  }

  /* 3-column layout */
  .cv-layout {
    display: grid;
    grid-template-columns: 200px 1fr 320px;
    gap: 0;
    flex: 1;
    overflow: hidden;
  }

  /* LEFT COL */
  .cv-left-col {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 14px;
    padding: 24px 20px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }

  .cv-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
    margin-bottom: 4px;
  }

  .cv-stat-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }

  .cv-stat-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .cv-stat-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  .cv-stat-val {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .cv-divider {
    width: 100%;
    height: 1px;
    background: var(--border);
  }

  .cv-links {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
  }

  .cv-links .link-btn {
    width: 100%;
    justify-content: center;
  }

  /* MIDDLE COL */
  .cv-mid-col {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 20px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
  }

  .cv-mid-bottom {
    display: flex;
    gap: 16px;
    flex: 1;
    min-height: 0;
  }

  .cv-notes-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 220px;
  }

  .cv-worst-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 220px;
  }

  /* RIGHT COL */
  .cv-right-col {
    display: flex;
    flex-direction: column;
    padding: 20px;
    overflow-y: auto;
  }

  .cv-best-card {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* Video lists */
  .tall-video-list,
  .short-video-list {
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex: 1;
  }

  .video-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid rgba(55,65,81,0.35);
    transition: background 0.12s ease;
  }

  .video-row:last-child { border-bottom: none; }
  .video-row:hover { background: rgba(255,255,255,0.02); }

  .video-row-rank {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    width: 18px;
    text-align: center;
    flex-shrink: 0;
  }

  .video-row-plat {
    font-size: 13px;
    flex-shrink: 0;
  }

  .video-row-title {
    flex: 1;
    font-size: 12px;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .video-row-views {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
    flex-shrink: 0;
  }

  .video-row-link {
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
    flex-shrink: 0;
  }

  .video-row-link:hover { text-decoration: underline; }

  /* old styles kept for reference — hidden */
  .creator-header-top {
    display: none;
  }

  .back-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .back-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }

  .creator-header-name {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .stage-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 999px;
    letter-spacing: 0.4px;
  }

  .stage-badge.green { background: rgba(16,185,129,0.15); color: var(--success-green); border: 1px solid rgba(16,185,129,0.3); }
  .stage-badge.yellow { background: rgba(245,158,11,0.15); color: var(--warning-amber); border: 1px solid rgba(245,158,11,0.3); }
  .stage-badge.red { background: rgba(239,68,68,0.15); color: var(--alert-red); border: 1px solid rgba(239,68,68,0.3); }

  .fire-btn {
    margin-left: auto;
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.35);
    color: var(--alert-red);
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .fire-btn:hover { background: rgba(239,68,68,0.22); }

  .creator-stats-row {
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .creator-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .creator-stat-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  .creator-stat-value {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .stat-divider {
    width: 1px;
    height: 30px;
    background: var(--border);
  }

  .contact-links {
    display: flex;
    gap: 8px;
    margin-left: auto;
  }

  .link-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 6px 14px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s ease;
  }

  .link-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }

  /* legacy stubs removed */

  /* ── CALENDAR HEATMAP ── */
  .card-panel {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .panel-sub {
    font-size: 12px;
    color: var(--text-muted);
  }

  .cal-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .cal-nav-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: all 0.12s ease;
  }

  .cal-nav-btn:hover { background: rgba(255,255,255,0.12); color: var(--text-primary); }

  .cal-month-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    min-width: 100px;
    text-align: center;
  }

  .cal-body {
    padding: 16px 18px;
  }

  .cal-dow-headers {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 6px;
  }

  .cal-dow {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 0;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-day {
    aspect-ratio: 1;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    position: relative;
    transition: transform 0.1s ease;
  }

  .cal-day:hover { transform: scale(1.08); }

  .cal-day.empty { background: transparent; }
  .cal-day.future { background: rgba(255,255,255,0.03); color: var(--text-muted); font-weight: 400; font-size: 11px; }
  .cal-day.posted-2 { background: rgba(16,185,129,0.75); color: white; box-shadow: 0 0 8px rgba(16,185,129,0.3); }
  .cal-day.posted-1 { background: rgba(245,158,11,0.6); color: white; }
  .cal-day.missed { background: rgba(239,68,68,0.45); color: rgba(255,255,255,0.7); }

  .cal-summary {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .cal-summary-item {
    font-size: 12px;
    color: var(--text-muted);
  }

  .cal-summary-item strong {
    color: var(--text-primary);
    font-weight: 700;
  }

  /* ── NOTES ── */
  .notes-body {
    padding: 16px 18px;
    display: flex;
    flex-direction: column;

const TODAY = new Date('2026-04-07');

function dateStr(offset) {
  const d = new Date(TODAY);
  d.setDate(d.getDate() + offset);
  return d.toISOString().split('T')[0];
}

function rnd(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// Generate posting history: array of {date, ig, tt}
function genPostHistory(daysBack, igRate, ttRate) {
  const posts = [];
  for (let i = daysBack; i >= 0; i--) {
    const date = dateStr(-i);
    posts.push({
      date,
      ig: Math.random() < igRate ? 1 : 0,
      tt: Math.random() < ttRate ? 1 : 0
    });
  }
  return posts;
}

// Ensure last 2 days have posts for GREEN creators
function forceGreen(history) {
  history.forEach((p, i) => {
    if (i >= history.length - 2) {
      p.ig = 1; p.tt = 1;
    }
  });
  return history;
}

// Generate videos

  const platforms = ['IG', 'TT'];

    'My morning routine 🌅', 'Day in my life vlog', 'How I edit my videos',

    const offsetDays = rnd(0, 30);

      id: i + 1,
      platform: platforms[i % 2],
      title: titles[i % titles.length],
      views: rnd(viewsMin, viewsMax),
      likes: rnd(Math.floor(viewsMin * 0.03), Math.floor(viewsMax * 0.08)),
      date: dateStr(-offsetDays),
      url: '#'
    });
  }
  return videos;
}

//  HELPERS
// ══════════════════════════════════════════════

function fmtViews(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'k';
  return n.toString();
}

function fmtDate(str) {
  const [y,m,d] = str.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
}

function daysSince(dateStr) {
  const d = new Date(dateStr);
  return Math.floor((TODAY - d) / 86400000);
}

// Determine tier for a creator
function getCreatorTier(creator) {
  const days = daysSince(creator.onboard_date);
  if (days < 14) return 'baby';
  const last7 = creator.posts.slice(-7);
  const total = last7.reduce((s, p) => s + p.ig + p.tt, 0);
  if (total >= 10) return 'green';
  if (total >= 5)  return 'yellow';
  return 'red';
}

function getConsistency(creator) {
  const last7 = creator.posts.slice(-7);
  const actual = last7.reduce((s, p) => s + p.ig + p.tt, 0);
  return actual; // raw count out of 14
}

function getTotalViews(creator) {
  return creator.videos.reduce((s, v) => s + v.views, 0);
}

function getAvgViews(creator) {
  if (!creator.videos.length) return 0;
  return Math.round(getTotalViews(creator) / creator.videos.length);
}

function getVideosInWindow(creator, window) {
  const cutoff = window === '48h' ? 2 : window === '7d' ? 7 : 30;
  return creator.videos.filter(v => daysSince(v.date) <= cutoff);
}

function navigate(screen, creatorId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  const target = document.getElementById('screen-' + screen);
  if (target) target.classList.add('active');

  state.currentScreen = screen;

  if (screen === 'dashboard') {
    document.querySelector('[data-nav="dashboard"]').classList.add('active');
    renderDashboard();
  } else if (screen === 'creator') {
    document.querySelector('[data-nav="creators"]').classList.add('active');
    state.currentCreatorId = creatorId;
    state.calViewDate = new Date(TODAY);
    renderCreatorView(creatorId);
  } else if (screen === 'chats') {
    document.querySelector('[data-nav="chats"]').classList.add('active');
    renderChats();
  }
}

function renderTiers() {
  const panel = document.getElementById('tiers-panel');
  const babyCreators = creators.filter(c => getCreatorTier(c) === 'baby');
  const nonBaby = creators.filter(c => getCreatorTier(c) !== 'baby');

  const byCompetency = state.sortMode === 'competency';

  // Tier grouping
  let greenCreators, yellowCreators, redCreators;
  if (byCompetency) {
    greenCreators  = nonBaby.filter(c => getAvgViews(c) > 3000);
    yellowCreators = nonBaby.filter(c => getAvgViews(c) >= 1000 && getAvgViews(c) <= 3000);
    redCreators    = nonBaby.filter(c => getAvgViews(c) < 1000);
  } else {
    greenCreators  = nonBaby.filter(c => getCreatorTier(c) === 'green');
    yellowCreators = nonBaby.filter(c => getCreatorTier(c) === 'yellow');
    redCreators    = nonBaby.filter(c => getCreatorTier(c) === 'red');
  }

  // Sort within tiers
  function sortCreators(list) {
    if (byCompetency) {
      return list.slice().sort((a,b) => getAvgViews(b) - getAvgViews(a));
    } else {
      return list.slice().sort((a,b) => getConsistency(b) - getConsistency(a));
    }
  }

  function viewsColor(avgViews) {
    if (avgViews > 3000)  return 'var(--success-green)';
    if (avgViews >= 1000) return 'var(--warning-amber)';
    return 'var(--alert-red)';
  }

  function buildTier(tierCreators, dotClass, label, sublabel) {
    const sorted = sortCreators(tierCreators);
    const section = document.createElement('div');
    section.className = 'tier-section ' + dotClass;

    const header = document.createElement('div');
    header.className = 'tier-header';
    header.innerHTML = `
      <div class="tier-dot ${dotClass}"></div>
      <div class="tier-label">${label} <span class="tier-sublabel">— ${sublabel}</span></div>
      <div class="tier-count">${tierCreators.length}</div>
    `;
    section.appendChild(header);

    const avatarRow = document.createElement('div');
    avatarRow.className = 'tier-avatars';

    sorted.forEach(c => {
      const avg = getAvgViews(c);
      const wrap = document.createElement('div');
      wrap.className = 'creator-avatar-wrap';
      wrap.innerHTML = `
        <div class="avatar-circle" style="background:${c.color}">${c.initials}</div>
        <div class="avatar-name">${c.name.split(' ')[0]}</div>
        <div class="avatar-stat">${c.posts.slice(-7).reduce((s,p)=>s+p.ig+p.tt,0)}/14 this week</div>
        <div class="avatar-stat-views" style="color:${viewsColor(avg)}">${fmtViews(avg)}/vid</div>
      `;
      wrap.addEventListener('click', () => navigate('creator', c.id));
      avatarRow.appendChild(wrap);
    });

    section.appendChild(avatarRow);
    return section;
  }

  panel.innerHTML = '';
  if (byCompetency) {
    panel.appendChild(buildTier(greenCreators,  'green',  'HIGH',   '> 3,000 views/vid'));
    panel.appendChild(buildTier(yellowCreators, 'yellow', 'MEDIUM', '1,000 – 3,000 views/vid'));
    panel.appendChild(buildTier(redCreators,    'red',    'LOW',    '< 1,000 views/vid'));
  } else {
    panel.appendChild(buildTier(greenCreators,  'green',  'GREEN',  'Posting Daily'));
    panel.appendChild(buildTier(yellowCreators, 'yellow', 'YELLOW', 'Inconsistent'));
    panel.appendChild(buildTier(redCreators,    'red',    'RED',    'Not Posting'));
  }

  // Babies
  if (babyCreators.length > 0) {
    const babiesSection = document.createElement('div');
    babiesSection.className = 'babies-section';
    babiesSection.innerHTML = `
      <div class="babies-header">
        <span style="font-size:16px">🍼</span>
        <div class="babies-title">Onboarding</div>
        <div class="tier-count">${babyCreators.length}</div>
      </div>
    `;

    const grid = document.createElement('div');
    grid.className = 'babies-grid';

    babyCreators.forEach(c => {
      const days = daysSince(c.onboard_date);
      const daysLeft = 14 - days;
      const card = document.createElement('div');
      card.className = 'baby-card';
      card.innerHTML = `
        <div class="baby-name">${c.name}</div>
        <div class="baby-meta">Joined ${fmtDate(c.onboard_date)} · Day ${days}/14</div>
        <div class="baby-action">→ ${daysLeft}d left in onboarding</div>
      `;
      card.addEventListener('click', () => navigate('creator', c.id));
      grid.appendChild(card);
    });

    babiesSection.appendChild(grid);
    panel.appendChild(babiesSection);
  }
}

function renderRankings() {
  const panel = document.getElementById('rankings-panel');

  // Gather all videos in time window across all creators
  let allVideos = [];
  creators.forEach(c => {
    getVideosInWindow(c, state.timeWindow).forEach(v => {

  allVideos.sort((a, b) => b.views - a.views);
  const bestVideos = allVideos.slice(0, 6);
  const worstVideos = allVideos.slice().sort((a, b) => a.views - b.views).slice(0, 6);

  function buildVideoRow(v, rank) {
    return `
      <div class="video-row">
        <div class="video-rank">${rank}</div>
        <div class="platform-icon">${v.platform === 'IG' ? '📷' : '🎵'}</div>

    <div class="rankings-header">Video Rankings · ${state.timeWindow}</div>
    <div class="rankings-cols">
      <div class="ranking-col col-worst">
        <div class="ranking-col-header">↓ Worst</div>

      </div>

        <div class="ranking-col-header">↑ Best</div>

  `;
}

// ── CALENDAR ──

function renderCalendar(c) {
  const year = state.calViewDate.getFullYear();
  const month = state.calViewDate.getMonth();

  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent = months[month] + ' ' + year;

  // Build post map
  const postMap = {};
  c.posts.forEach(p => { postMap[p.date] = { ig: p.ig, tt: p.tt }; });

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const firstDow = (firstDay.getDay() + 6) % 7; // Mon=0
  const daysInMonth = lastDay.getDate();

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Empty cells
  for (let i = 0; i < firstDow; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-day empty';
    grid.appendChild(cell);
  }

  const todayStr = TODAY.toISOString().split('T')[0];

  for (let d = 1; d <= daysInMonth; d++) {
    const dateS = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isFuture = dateS > todayStr;
    const post = postMap[dateS];

    const cell = document.createElement('div');

    if (isFuture) {
      cell.className = 'cal-day future';
      cell.textContent = d;
    } else if (!post) {
      cell.className = 'cal-day missed';
      cell.textContent = '0';
    } else {
      const count = post.ig + post.tt;
      if (count >= 2) cell.className = 'cal-day posted-2';
      else if (count === 1) cell.className = 'cal-day posted-1';
      else cell.className = 'cal-day missed';
      cell.textContent = count;
    }

    cell.title = dateS;
    grid.appendChild(cell);
  }

  // Week summary (current week Mon-Sun)
  const weekDays = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(TODAY);
    d.setDate(d.getDate() - i);
    weekDays.push(d.toISOString().split('T')[0]);
  }
  let weekPosts = 0;
  weekDays.forEach(ds => {
    const p = postMap[ds];
    if (p) weekPosts += p.ig + p.tt;
  });

  document.getElementById('cal-summary').innerHTML = `
    <div class="cal-summary-item">This week: <strong>${weekPosts}/14</strong> posts</div>
    <div class="cal-summary-item" style="margin-left:auto">
      <span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:rgba(16,185,129,0.75);margin-right:4px"></span>Both
      <span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:rgba(245,158,11,0.6);margin:0 4px 0 10px"></span>One
      <span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:rgba(239,68,68,0.45);margin:0 4px 0 10px"></span>None
    </div>
  `;
}

function renderChatWindow() {
  const c = creators.find(c => c.id === state.currentChatId);

  const messages = state.chatMessages[c.id] || [];

      ${m.from !== 'me' ? `<div class="bubble-sender">${m.sender}</div>` : ''}
      <div class="bubble ${m.from === 'me' ? 'me' : 'them'}">${m.text}</div>
      <div class="bubble-time">${m.time}</div>
    </div>
  `).join('');

  document.getElementById('send-btn').onclick = () => {
    const input = document.getElementById('compose-input');
    const text = input.value.trim();
    if (!text) return;
    state.chatMessages[c.id].push({ from: 'me', text, time: 'just now' });
    input.value = '';
    renderChatWindow();
  };

  document.getElementById('checkin-btn').onclick = () => {
    const msg = `Hey ${c.name.split(' ')[0]}! Just checking in — how are the posts going this week? 💪`;
    state.chatMessages[c.id].push({ from: 'me', text: msg, time: 'just now' });
    renderChatWindow();
    showToast('Check-in sent to ' + c.name);
  };
}

    btn.classList.add('active');
    state.cvBestWindow = btn.dataset.time;
    const c = creators.find(c => c.id === state.currentCreatorId);
    if (c) renderBestVideos(c);
  });
});

// Worst videos time toggle
document.querySelectorAll('#cv-worst-toggle .toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#cv-worst-toggle .toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.cvWorstWindow = btn.dataset.time;
    const c = creators.find(c => c.id === state.currentCreatorId);
    if (c) renderWorstVideos(c);
  });
});

// Fire modal background click
document.getElementById('fire-modal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

// Compose input — enter to send
document.getElementById('compose-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('send-btn').click();
  }
});

// Note input — enter to add
document.getElementById('note-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('note-add-btn').click();
});

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════

navigate('dashboard');
</script>
</body>
</html>
